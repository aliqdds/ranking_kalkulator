name: Update ranking daily

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python update_ranking.py

      - name: Commit ranking.json if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ranking.json
          if git diff --staged --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "Automatisk oppdatering av ranking"
            git push
          fi
